<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Catalog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1e40af, #6d28d9);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header span {
      background: rgba(255,255,255,0.2);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .container { max-width: 1100px; margin: 40px auto; padding: 0 24px; }

    /* Status bar */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px 20px;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-green { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .dot-red   { background: #ef4444; }
    .dot-yellow{ background: #eab308; }

    /* Add product form */
    .add-form {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 30px;
    }
    .add-form h2 { margin-bottom: 16px; font-size: 1rem; color: #94a3b8; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-row input {
      flex: 1;
      min-width: 140px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 0.9rem;
    }
    .form-row input::placeholder { color: #64748b; }
    .btn-add {
      background: linear-gradient(135deg, #1e40af, #6d28d9);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .btn-add:hover { opacity: 0.85; }

    /* Product grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 22px;
      position: relative;
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-4px); }

    .card-category {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6d28d9;
      margin-bottom: 8px;
    }
    .card-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 14px; }
    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
    }
    .card-price { font-size: 1.3rem; font-weight: 700; color: #60a5fa; }
    .card-stock { font-size: 0.8rem; color: #64748b; }

    .btn-delete {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(239,68,68,0.15);
      color: #ef4444;
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.3); }

    #loading { text-align: center; padding: 60px; color: #64748b; font-size: 1.1rem; }
  </style>
</head>
<body>

<header>
  <h1>🛍️ Product Catalog</h1>
  <span id="product-count">Loading...</span>
</header>

<div class="container">

  <!-- Backend status -->
  <div id="status-bar">
    <div class="dot dot-yellow" id="status-dot"></div>
    <span id="status-text">Connecting to backend...</span>
  </div>

  <!-- Add product form -->
  <div class="add-form">
    <h2>➕ Add New Product</h2>
    <div class="form-row">
      <input id="inp-name"     type="text"   placeholder="Product name" />
      <input id="inp-category" type="text"   placeholder="Category" />
      <input id="inp-price"    type="number" placeholder="Price (₹)" />
      <input id="inp-stock"    type="number" placeholder="Stock qty" />
      <button class="btn-add" onclick="addProduct()">Add Product</button>
    </div>
  </div>

  <!-- Product cards -->
  <div id="loading">Loading products...</div>
  <div class="grid" id="product-grid"></div>

</div>

<script>
  // ── Point this to your backend ──────────────────────────────
  // When running locally: http://localhost:5000
  // When running in Docker: will be updated automatically
  const BACKEND = '__BACKEND_URL__';

  // ── Fetch and render products ────────────────────────────────
  async function loadProducts() {
    try {
      const res  = await fetch(`${BACKEND}/api/products`);
      const json = await res.json();

      document.getElementById('status-dot').className  = 'dot dot-green';
      document.getElementById('status-text').textContent = `Backend connected — API is healthy`;
      document.getElementById('product-count').textContent = `${json.count} Products`;

      renderProducts(json.data);
    } catch (err) {
      document.getElementById('status-dot').className  = 'dot dot-red';
      document.getElementById('status-text').textContent = 'Cannot reach backend at ' + BACKEND;
      document.getElementById('loading').textContent = 'Failed to load products.';
    }
  }

  function renderProducts(products) {
    document.getElementById('loading').style.display = 'none';
    const grid = document.getElementById('product-grid');
    grid.innerHTML = '';

    products.forEach(p => {
      grid.innerHTML += `
        <div class="card" id="card-${p.id}">
          <button class="btn-delete" onclick="deleteProduct(${p.id})">✕</button>
          <div class="card-category">${p.category}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-row">
            <div class="card-price">₹${p.price.toLocaleString()}</div>
            <div class="card-stock">Stock: ${p.stock}</div>
          </div>
        </div>`;
    });
  }

  // ── Add product ──────────────────────────────────────────────
  async function addProduct() {
    const name     = document.getElementById('inp-name').value.trim();
    const category = document.getElementById('inp-category').value.trim();
    const price    = document.getElementById('inp-price').value;
    const stock    = document.getElementById('inp-stock').value;

    if (!name || !category || !price) {
      alert('Name, category and price are required');
      return;
    }

    await fetch(`${BACKEND}/api/products`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, category, price, stock })
    });

    // Clear inputs
    ['inp-name','inp-category','inp-price','inp-stock'].forEach(id => {
      document.getElementById(id).value = '';
    });

    loadProducts(); // Refresh
  }

  // ── Delete product ───────────────────────────────────────────
  async function deleteProduct(id) {
    await fetch(`${BACKEND}/api/products/${id}`, { method: 'DELETE' });
    loadProducts();
  }

  // Load on page open
  loadProducts();
</script>
</body>
</html>
